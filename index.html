<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>crush oi ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4ec 50%, #ffd6e0 100%);
            color: #5a3d4a;
            line-height: 1.6;
            min-height: 100vh;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>❤️</text></svg>") 12 12, auto;
        }

        #heartCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999;
        }

        .floating-emoji {
            position: fixed; font-size: 2rem; opacity: 0.25;
            animation: floatUp linear infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
            50%  { opacity: 0.35; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255,240,245,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 24px;
            display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,105,135,0.2);
        }
        nav a {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem; color: #c94b6d;
            text-decoration: none; font-weight: 700;
            transition: transform 0.2s, color 0.2s;
            position: relative;
        }
        nav a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: #ff6b8a; transition: width 0.3s;
        }
        nav a:hover { color: #ff6b8a; transform: scale(1.1); }
        nav a:hover::after { width: 100%; }

        section {
            position: relative; z-index: 1;
            max-width: 1000px; margin: 0 auto;
            padding: 100px 24px 80px;
        }

        #hero {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }
        #hero .avatar {
            width: 180px; height: 180px; border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffb6c1;
            box-shadow: 0 8px 32px rgba(255,105,135,0.3);
            margin-bottom: 24px;
            transition: transform 0.3s;
        }
        #hero .avatar:hover { transform: scale(1.05) rotate(-3deg); }
        #hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; color: #c94b6d;
            text-shadow: 0 2px 12px rgba(255,105,135,0.3);
        }
        #hero .subtitle {
            font-size: 1.3rem; color: #d96a8a; margin-top: 8px;
        }
        #hero .tagline {
            font-size: 1rem; color: #b05c74;
            margin-top: 16px; max-width: 500px;
        }
        .heart-btn {
            margin-top: 32px;
            background: linear-gradient(135deg, #ff6b8a, #ff8fab);
            border: none; color: #fff;
            font-size: 1.1rem; font-weight: 700;
            padding: 14px 36px; border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,107,138,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Quicksand', sans-serif;
        }
        .heart-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 28px rgba(255,107,138,0.5);
        }

        #timeline {
            background: rgba(255,255,255,0.4);
            border-radius: 24px; padding: 60px 32px;
            margin: 40px auto; backdrop-filter: blur(4px);
        }
        #timeline h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem; text-align: center;
            color: #c94b6d; margin-bottom: 40px;
        }
        .timeline-grid {
            display: flex; flex-direction: column; gap: 24px;
        }
        .timeline-item {
            display: flex; align-items: flex-start; gap: 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 16px; padding: 20px 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #ff8fab;
        }
        .timeline-item:hover {
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(255,105,135,0.15);
        }
        .timeline-item .emoji { font-size: 2rem; flex-shrink: 0; }
        .timeline-item .text h3 { font-size: 1.1rem; color: #c94b6d; }
        .timeline-item .text p { font-size: 0.95rem; color: #7a5a65; margin-top: 4px; }

        #love-notes {
            padding: 60px 24px; text-align: center;
        }
        #love-notes h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem; color: #c94b6d; margin-bottom: 32px;
        }
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .note-card {
            background: rgba(255,255,255,0.6);
            border-radius: 20px; padding: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }
        .note-card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(255,105,135,0.2);
        }
        .note-sticker { width: 100%; max-width: 200px; height: auto; object-fit: contain; border-radius: 16px; }

        #wishes {
            background: rgba(255,255,255,0.4);
            border-radius: 24px; padding: 60px 32px;
            margin: 40px auto; backdrop-filter: blur(4px);
            text-align: center;
        }
        #wishes h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem; color: #c94b6d; margin-bottom: 24px;
        }
        .wish-sticker { width: 120px; height: auto; margin: 0 auto 20px; display: block; border-radius: 16px; }
        #wishes p { font-size: 1.1rem; color: #7a5a65; margin-bottom: 20px; }
        .secret-btn {
            background: transparent;
            border: 2px dashed #ff8fab;
            color: #d96a8a;
            font-size: 1rem; font-weight: 600;
            padding: 12px 28px; border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Quicksand', sans-serif;
        }
        .secret-btn:hover {
            background: #ff8fab;
            color: #fff;
            border-color: #ff8fab;
            transform: scale(1.05);
        }
        #secret-message {
            margin-top: 20px;
            font-size: 1.3rem;
            font-family: 'Dancing Script', cursive;
            color: #c94b6d;
            opacity: 0;
            transition: opacity 0.6s;
            min-height: 40px;
        }
        #secret-message.show { opacity: 1; }

        footer {
            text-align: center; padding: 32px 24px;
            color: #b05c74; font-size: 1rem;
            font-family: 'Dancing Script', cursive;
        }

        @media (max-width: 640px) {
            nav { gap: 16px; padding: 10px 16px; }
            nav a { font-size: 1rem; }
            #hero h1 { font-size: 2.4rem; }
            #hero .avatar { width: 140px; height: 140px; }
            section { padding: 80px 16px 60px; }
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<nav>
    <a href="#hero">🏠</a>
    <a href="#timeline">📅</a>
    <a href="#love-notes">💌</a>
    <a href="#wishes">🎀</a>
</nav>

<section id="hero">
    <img class="avatar" src="stickers/hero.png" alt="sticker" />
    <h1>cho em gửi cái này ❤️</h1>
    <p class="subtitle">nhấn vào đâu cũng có tim bay ✨</p>
    <button class="heart-btn" onclick="burstHearts(60)">💖 bấm nè</button>
</section>

<section id="timeline">
    <h2>📖 nhắn em</h2>
    <div class="timeline-grid">
        <div class="timeline-item">
            <span class="emoji">🌤️</span>
            <div class="text">
                <p>chúc em một ngày tốt lành</p>
            </div>
        </div>
        <div class="timeline-item">
            <span class="emoji">☕</span>
            <div class="text">
                <p>nhớ uống đủ nước nha</p>
            </div>
        </div>
        <div class="timeline-item">
            <span class="emoji">🌙</span>
            <div class="text">
                <p>ngủ sớm nè, đừng thức khuya</p>
            </div>
        </div>
    </div>
</section>

<section id="love-notes">
    <h2>💌 sticker cho em</h2>
    <div class="notes-grid">
        <div class="note-card">
            <img src="stickers/sticker1.png" alt="sticker" class="note-sticker" />
        </div>
        <div class="note-card">
            <img src="stickers/sticker2.png" alt="sticker" class="note-sticker" />
        </div>
        <div class="note-card">
            <img src="stickers/sticker3.png" alt="sticker" class="note-sticker" />
        </div>
    </div>
</section>

<section id="wishes">
    <h2>🎀 tặng em nè</h2>
    <img src="stickers/sticker4.png" alt="sticker" class="wish-sticker" />
    <button class="secret-btn" onclick="toggleSecret()">💗 bấm để thấy bất ngờ</button>
    <div id="secret-message"></div>
</section>

<footer>
    làm cho em ❤️
</footer>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animating = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            const emojis = ['❤️','💕','💖','💗','💘','💝','🌸','🌷','✨','💋','🥰','😘'];
            this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            this.size = 16 + Math.random() * 24;
            this.speedX = (Math.random() - 0.5) * 10;
            this.speedY = -Math.random() * 12 - 2;
            this.gravity = 0.2 + Math.random() * 0.15;
            this.opacity = 1;
            this.rotation = Math.random() * 360;
            this.rotSpeed = (Math.random() - 0.5) * 12;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.speedY += this.gravity;
            this.speedX *= 0.99;
            this.opacity -= 0.008;
            this.rotation += this.rotSpeed;
        }

        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.opacity);
            ctx.font = this.size + 'px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        }
    }

    function burstHearts(count) {
        if (!count) count = 40;
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(
                Math.random() * canvas.width,
                Math.random() * canvas.height * 0.6 + canvas.height * 0.1
            ));
        }
        if (!animating) {
            animating = true;
            animate();
        }
    }

    function addBurstAt(x, y) {
        for (let i = 0; i < 30; i++) {
            particles.push(new Particle(x, y));
        }
        if (!animating) {
            animating = true;
            animate();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw(ctx);
            if (particles[i].opacity <= 0) {
                particles.splice(i, 1);
            }
        }
        if (particles.length > 0) {
            requestAnimationFrame(animate);
        } else {
            animating = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    document.addEventListener('click', function(e) {
        addBurstAt(e.clientX, e.clientY);
    });

    const secretMessages = [
        "cảm ơn em đã ghé thăm ❤️",
        "em dễ thương quá à 😊",
        "chúc em luôn vui vẻ 🌸",
        "hôm nay em ăn cơm chưa? 💕",
        "ngủ sớm nha em ✨",
    ];

    function toggleSecret() {
        const el = document.getElementById('secret-message');
        const msg = secretMessages[Math.floor(Math.random() * secretMessages.length)];
        el.textContent = msg;
        el.classList.remove('show');
        void el.offsetWidth;
        el.classList.add('show');
    }

    const emojisBg = ['❤️','💛','💚','💙','💜','🌸','✨','🌷','🌹'];
    for (let i = 0; i < 20; i++) {
        const span = document.createElement('span');
        span.className = 'floating-emoji';
        span.textContent = emojisBg[Math.floor(Math.random() * emojisBg.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
        span.style.animationDuration = (10 + Math.random() * 20) + 's';
        span.style.animationDelay = (Math.random() * 20) + 's';
        document.body.appendChild(span);
    }
</script>

</body>
</html>
